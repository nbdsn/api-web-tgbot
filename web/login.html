<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API-WEB-TGBOT 登录</title>
  <style>
    :root {
      --card: #ffffff;
      --primary: #0b63f6;
      --text: #1a2233;
      --muted: #6b7892;
      --border: #d8e0ef;
      --danger: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top right, #d7e5ff, #f3f6fb 45%), linear-gradient(140deg, #eef3ff 0%, #f8fbff 100%);
      color: var(--text);
    }
    .card {
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(20, 33, 61, 0.12);
      padding: 28px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 22px; color: var(--muted); font-size: 14px; }
    label { display: block; margin: 12px 0 6px; font-size: 13px; color: var(--muted); }
    input {
      width: 100%;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(11, 99, 246, 0.12); }
    button {
      margin-top: 18px;
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .error { margin-top: 10px; color: var(--danger); font-size: 13px; min-height: 18px; }
    .hint { margin-top: 12px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>API-WEB-TGBOT</h1>
    <p>独立管理面板登录</p>
    <label>账号</label>
    <input id="username" placeholder="默认 admin" value="admin" />
    <label>密码</label>
    <input id="password" type="password" placeholder="默认 admin" value="admin" />
    <button id="loginBtn">登录</button>
    <div class="error" id="errorText"></div>
    <div class="hint">首次登录后请立即在账号设置中修改账号密码。</div>
  </div>

  <script>
    const errorText = document.getElementById('errorText');

    async function doLogin() {
      errorText.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!data.success) {
          errorText.textContent = data.message || '登录失败';
          return;
        }
        location.href = '/';
      } catch (err) {
        errorText.textContent = '网络异常，请稍后重试';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
